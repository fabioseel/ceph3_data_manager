<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>S3 Config Explorer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <header class="top-header">
      <h1>S3 Config Explorer</h1>
      <button type="button" id="toggleSettingsMenu" class="settings-button secondary">⚙️ Settings</button>
      <div id="settingsMenu" class="settings-menu hidden">
        <form method="get" class="controls settings-form">
          <label>
            Bucket
            <input name="bucket" value="{{ bucket }}" placeholder="my-config-bucket" required />
          </label>
          <label>
            Prefix (optional)
            <input name="prefix" value="{{ prefix }}" placeholder="team-a/" />
          </label>
          <label>
            AWS Region (optional)
            <input name="region" value="{{ region }}" placeholder="us-east-1" />
          </label>
          <label>
            S3 Endpoint URL (optional)
            <input name="endpoint_url" value="{{ endpoint_url }}" placeholder="https://s3.example.local" />
          </label>
          <label class="inline-toggle">
            <input type="checkbox" id="autoHideConstantInSettings" checked />
            Auto-hide constant columns
          </label>
          <button type="submit">Load Experiments</button>
        </form>
        <section class="presets">
          <button type="button" id="presetPublic" class="secondary">Use Galvani Public Endpoint</button>
          <button type="button" id="presetPrivate" class="secondary">Use Galvani Private Endpoint</button>
        </section>
      </div>
    </header>
    <main class="container">
      <div id="errorBox" class="error hidden"></div>

      <section id="progressSection" class="progress hidden">
        <div class="progress-head">
          <strong id="progressLabel">Preparing...</strong>
          <button id="abortButton" type="button" class="secondary">Abort</button>
        </div>
        <progress id="progressBar" max="100" value="0"></progress>
        <p id="progressText" class="count">0 / 0</p>
      </section>

      <section id="tableControls" class="table-controls hidden">
        <button type="button" id="openColumnManager" class="secondary">Manage Columns</button>
        <button type="button" id="openFilterManager" class="secondary">Manage Filters</button>
      </section>

      <section id="filtersPanel" class="panel hidden">
        <div class="panel-head">
          <strong>Active Filters</strong>
          <div class="visibility-actions">
            <button type="button" id="openAddFilter" class="secondary">Add Filter</button>
            <button type="button" id="clearAllFilters" class="secondary">Clear All Filters</button>
            <button type="button" id="closeFilterManager" class="secondary">Close</button>
          </div>
        </div>
        <div id="filterComposer" class="filter-composer hidden">
          <label>
            Column
            <select id="filterColumnSelect" onchange="updateFilterValueOptions()"></select>
          </label>
          <label>
            Operator
            <select id="filterOperatorSelect">
              <option value="contains">Contains</option>
              <option value="missing">Is Missing</option>
            </select>
          </label>
          <label>
            Value
            <input id="filterValueInput" placeholder="or select from dropdown..." list="filterValueList" />
            <datalist id="filterValueList"></datalist>
          </label>
          <div class="visibility-actions">
            <button type="button" id="applyFilter" class="secondary">Apply Filter</button>
            <button type="button" id="cancelAddFilter" class="secondary">Cancel</button>
          </div>
        </div>
        <div id="activeFiltersList" class="active-filters-list"></div>
        <div class="filter-settings-io">
          <div class="visibility-actions">
            <button type="button" id="exportFilterSettings" class="secondary">Export YAML</button>
            <button type="button" id="importFilterSettings" class="secondary">Import YAML</button>
          </div>
          <label>
            Filter Settings YAML
            <textarea
              id="filterSettingsYaml"
              class="yaml-area"
              placeholder="Exported filter settings and matching experiments will appear here..."
            ></textarea>
          </label>
        </div>
      </section>

      <section id="columnManager" class="column-manager hidden">
        <div class="panel-head">
          <strong>Column Visibility</strong>
          <button type="button" id="closeColumnManager" class="secondary">Close</button>
        </div>
        <label class="column-search">
          Search Columns
          <input id="columnSearchInput" placeholder="find a column by name" />
        </label>
        <div class="search-actions">
          <button type="button" id="hideSearchMatches" class="secondary">Hide Matches</button>
          <button type="button" id="showSearchMatches" class="secondary">Show Matches</button>
        </div>
        <div class="visibility-actions">
          <button type="button" id="showAllColumns" class="secondary">Show All Columns</button>
          <button type="button" id="hideConstantColumns" class="secondary">Hide Constant Columns Now</button>
        </div>
        <div class="column-buckets">
          <section class="column-bucket">
            <h3>Visible</h3>
            <div id="visibleColumnsList" class="column-list"></div>
          </section>
          <section class="column-bucket">
            <h3>Hidden</h3>
            <div id="hiddenColumnsList" class="column-list"></div>
          </section>
        </div>
      </section>

      <p class="count hidden" id="countLine">Showing <span id="visibleCount"></span> of <span id="totalCount"></span> rows</p>

      <div class="table-wrap hidden" id="tableWrap">
        <table id="recordsTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <p id="emptyState">Enter a bucket and load data.</p>
    </main>

    <script>
      const toggleSettingsMenuButton = document.getElementById("toggleSettingsMenu");
      const settingsMenu = document.getElementById("settingsMenu");
      const controlsForm = document.querySelector("form.controls");
      const errorBox = document.getElementById("errorBox");
      const progressSection = document.getElementById("progressSection");
      const progressLabel = document.getElementById("progressLabel");
      const progressText = document.getElementById("progressText");
      const progressBar = document.getElementById("progressBar");
      const abortButton = document.getElementById("abortButton");

      const tableControls = document.getElementById("tableControls");
      const openColumnManagerButton = document.getElementById("openColumnManager");
      const openFilterManagerButton = document.getElementById("openFilterManager");
      const autoHideConstantCheckbox = document.getElementById("autoHideConstantInSettings");

      const filtersPanel = document.getElementById("filtersPanel");
      const openAddFilterButton = document.getElementById("openAddFilter");
      const closeFilterManagerButton = document.getElementById("closeFilterManager");
      const clearAllFiltersButton = document.getElementById("clearAllFilters");
      const filterComposer = document.getElementById("filterComposer");
      const filterColumnSelect = document.getElementById("filterColumnSelect");
      const filterOperatorSelect = document.getElementById("filterOperatorSelect");
      const filterValueInput = document.getElementById("filterValueInput");
      const filterValueList = document.getElementById("filterValueList");
      const applyFilterButton = document.getElementById("applyFilter");
      const cancelAddFilterButton = document.getElementById("cancelAddFilter");
      const activeFiltersList = document.getElementById("activeFiltersList");
      const exportFilterSettingsButton = document.getElementById("exportFilterSettings");
      const importFilterSettingsButton = document.getElementById("importFilterSettings");
      const filterSettingsYaml = document.getElementById("filterSettingsYaml");

      const columnManager = document.getElementById("columnManager");
      const closeColumnManagerButton = document.getElementById("closeColumnManager");
      const showAllColumnsButton = document.getElementById("showAllColumns");
      const hideConstantColumnsButton = document.getElementById("hideConstantColumns");
      const hideSearchMatchesButton = document.getElementById("hideSearchMatches");
      const showSearchMatchesButton = document.getElementById("showSearchMatches");
      const columnSearchInput = document.getElementById("columnSearchInput");
      const visibleColumnsList = document.getElementById("visibleColumnsList");
      const hiddenColumnsList = document.getElementById("hiddenColumnsList");

      const countLine = document.getElementById("countLine");
      const visibleCount = document.getElementById("visibleCount");
      const totalCount = document.getElementById("totalCount");
      const tableWrap = document.getElementById("tableWrap");
      const tableHead = document.getElementById("tableHead");
      const tableBody = document.getElementById("tableBody");
      const emptyState = document.getElementById("emptyState");

      const presetPublic = document.getElementById("presetPublic");
      const presetPrivate = document.getElementById("presetPrivate");
      const endpointInput = document.querySelector('input[name="endpoint_url"]');
      const regionInput = document.querySelector('input[name="region"]');

      let currentJobId = null;
      let activeDatasetJobId = null;
      let currentColumns = [];
      let dragSrcColumn = null;
      let currentRows = [];
      let currentMatchingIndexes = [];
      let baseRows = [];
      let visibleColumns = [];
      let columnFiltersState = {};
      let openHeaderMenu = null;
      let filterRequestToken = 0;
      let sortState = { column: null, direction: null };
      const HIDDEN_COLUMNS_STORAGE_KEY = "ceph3_data_manager.hidden_columns";

      function getPrimaryIdColumn() {
        return currentColumns.includes("run_name") ? "run_name" : "experiment_id";
      }

      function loadPersistedHiddenColumns() {
        try {
          const raw = window.localStorage.getItem(HIDDEN_COLUMNS_STORAGE_KEY);
          if (!raw) return new Set();
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return new Set();
          return new Set(parsed.map((item) => String(item)));
        } catch (_) {
          return new Set();
        }
      }

      function persistColumnPreferences() {
        try {
          const primaryIdColumn = getPrimaryIdColumn();
          const hidden = currentColumns.filter((column) => column !== primaryIdColumn && !visibleColumns.includes(column));
          window.localStorage.setItem(HIDDEN_COLUMNS_STORAGE_KEY, JSON.stringify(hidden));
          // Cleanup from older versions that persisted visible columns.
          window.localStorage.removeItem("ceph3_data_manager.visible_columns");
        } catch (_) {
          // Ignore localStorage errors (e.g. private mode / quota).
        }
      }

      function applyPersistedHiddenColumns() {
        const primaryIdColumn = getPrimaryIdColumn();
        const hiddenSet = loadPersistedHiddenColumns();
        visibleColumns = currentColumns.filter((column) => column === primaryIdColumn || !hiddenSet.has(column));
      }

      function toggleSettingsMenu() {
        settingsMenu.classList.toggle("hidden");
      }

      function closeSettingsMenu() {
        settingsMenu.classList.add("hidden");
      }

      toggleSettingsMenuButton.addEventListener("click", toggleSettingsMenu);
      document.addEventListener("click", (event) => {
        if (!event.target.closest(".top-header") && !settingsMenu.classList.contains("hidden")) {
          closeSettingsMenu();
        }
      });

      function setError(message) {
        if (!message) {
          errorBox.classList.add("hidden");
          errorBox.textContent = "";
          return;
        }
        errorBox.textContent = message;
        errorBox.classList.remove("hidden");
      }

      function setLoading(active) {
        progressSection.classList.toggle("hidden", !active);
        controlsForm.querySelector("button[type='submit']").disabled = active;
      }

      function updateProgress(status) {
        const phase = status.phase || "loading";
        const processed = Number(status.processed || 0);
        const total = Number(status.total || 0);
        progressLabel.textContent = phase === "starting" ? "Preparing..." : "Loading experiments...";
        progressText.textContent = `${processed} / ${total}`;
        progressBar.value = total > 0 ? Math.min(100, Math.floor((processed / total) * 100)) : 0;
      }

      function setColumnVisible(column, visible) {
        const primaryIdColumn = getPrimaryIdColumn();
        if (column === primaryIdColumn) return;

        if (visible) {
          if (!visibleColumns.includes(column)) {
            visibleColumns.push(column);
          }
        } else {
          visibleColumns = visibleColumns.filter((item) => item !== column);
        }

        persistColumnPreferences();
      }

      function getConstantColumns() {
        const constants = new Set();
        if (!currentRows.length) return constants;

        const primaryIdColumn = getPrimaryIdColumn();

        currentColumns.forEach((column) => {
          if (column === primaryIdColumn) return;
          const firstValue = String(currentRows[0][column] ?? "");
          const allSame = currentRows.every((row) => String(row[column] ?? "") === firstValue);
          if (allSame) constants.add(column);
        });

        return constants;
      }

      function hideConstantColumns() {
        const constants = getConstantColumns();
        const primaryIdColumn = getPrimaryIdColumn();
        // Hide constants on top of current visibility so persisted hidden choices remain hidden.
        visibleColumns = visibleColumns.filter((column) => column === primaryIdColumn || !constants.has(column));
        persistColumnPreferences();
      }

      // Groups columns whose values are identical across every row into a single display column.
      // Returns [{key: firstColName, columns: [col, ...]}, ...] in original column order.
      function computeColumnMergeGroups(rows, columns) {
        if (rows.length < 2 || columns.length <= 1) {
          return columns.map((col) => ({ key: col, columns: [col] }));
        }

        // Build a signature for each column: null-joined concatenation of all row values.
        const signatures = new Map();
        columns.forEach((col) => {
          signatures.set(col, rows.map((row) => String(row[col] ?? "")).join("\x00"));
        });

        // Group columns that share the same signature.
        const sigToGroup = new Map();
        columns.forEach((col) => {
          const sig = signatures.get(col);
          if (!sigToGroup.has(sig)) sigToGroup.set(sig, []);
          sigToGroup.get(sig).push(col);
        });

        // Return one entry per unique signature, in original column order.
        // The key is the shortest column name in the group — used as the primary header label.
        const seen = new Set();
        return columns
          .filter((col) => {
            const sig = signatures.get(col);
            if (seen.has(sig)) return false;
            seen.add(sig);
            return true;
          })
          .map((col) => {
            const groupCols = sigToGroup.get(signatures.get(col));
            const shortest = groupCols.reduce((a, b) => (a.length <= b.length ? a : b));
            return { key: shortest, columns: groupCols };
          });
      }

      function columnHasNumericValues(column) {
        let sawNumericValue = false;
        for (const row of baseRows) {
          const rawValue = String(row[column] ?? "").trim();
          if (!rawValue) {
            continue;
          }

          if (Number.isFinite(Number(rawValue))) {
            sawNumericValue = true;
          }
        }

        return sawNumericValue;
      }

      function getFilterOperatorOptions(column) {
        const options = [
          { value: "contains", label: "Contains" },
          { value: "not_contains", label: "Does Not Contain" },
          { value: "missing", label: "Is Missing" },
        ];

        if (columnHasNumericValues(column)) {
          options.push({ value: "lt", label: "Smaller Than" });
          options.push({ value: "gt", label: "Larger Than" });
        }

        return options;
      }

      function populateOperatorSelect(selectElement, column, requestedOperator = "contains") {
        const options = getFilterOperatorOptions(column);
        const allowedOperators = new Set(options.map((option) => option.value));
        const selectedOperator = allowedOperators.has(requestedOperator) ? requestedOperator : "contains";

        selectElement.innerHTML = "";
        options.forEach((option) => {
          const optionElement = document.createElement("option");
          optionElement.value = option.value;
          optionElement.textContent = option.label;
          optionElement.selected = option.value === selectedOperator;
          selectElement.appendChild(optionElement);
        });

        return selectedOperator;
      }

      function updateFilterValueInputState(inputElement, operator, useSuggestions = false) {
        const requiresNoValue = operator === "missing";
        inputElement.disabled = requiresNoValue;

        if (requiresNoValue) {
          inputElement.value = "";
          inputElement.placeholder = "no value required";
          inputElement.removeAttribute("list");
          return;
        }

        if (operator === "contains" || operator === "not_contains") {
          inputElement.placeholder = operator === "contains" ? "or select from dropdown..." : "must not contain...";
          if (useSuggestions && operator === "contains") {
            inputElement.setAttribute("list", "filterValueList");
          } else {
            inputElement.removeAttribute("list");
          }
          return;
        }

        inputElement.placeholder = "enter a number";
        inputElement.removeAttribute("list");
      }

      function normalizeContainsFilterValue(value) {
        const values = (Array.isArray(value) ? value : String(value || "").split(","))
          .map((item) => String(item || "").trim().toLowerCase())
          .filter(Boolean);

        if (!values.length) {
          return null;
        }

        return values.length === 1 ? values[0] : values;
      }

      function normalizeFilterDefinition(operator, value) {
        const normalizedOperator = String(operator || "contains").trim().toLowerCase();
        if (normalizedOperator === "missing") {
          return { operator: "missing" };
        }

        if (normalizedOperator === "contains" || normalizedOperator === "not_contains") {
          const normalizedValue = normalizeContainsFilterValue(value);
          return normalizedValue ? { operator: normalizedOperator, value: normalizedValue } : null;
        }

        if (normalizedOperator === "lt" || normalizedOperator === "gt") {
          const numericText = String(value || "").trim();
          if (!numericText) {
            return null;
          }
          if (!Number.isFinite(Number(numericText))) {
            return { invalid: "Numeric filters require a valid number." };
          }
          return { operator: normalizedOperator, value: numericText };
        }

        return { invalid: `Unsupported filter operator: ${normalizedOperator}` };
      }

      function setColumnFilter(column, operator, value) {
        const nextFilter = normalizeFilterDefinition(operator, value);
        if (nextFilter && nextFilter.invalid) {
          setError(nextFilter.invalid);
          return false;
        }

        if (nextFilter) {
          columnFiltersState[column] = nextFilter;
        } else {
          delete columnFiltersState[column];
        }

        syncFilterInputs(column);
        buildActiveFiltersPanel();
        applyFilters();
        return true;
      }

      function formatFilterValueForInput(filterState) {
        if (!filterState || filterState.operator === "missing") {
          return "";
        }
        if (Array.isArray(filterState.value)) {
          return filterState.value.join(", ");
        }
        return String(filterState.value || "");
      }

      function formatFilterLabel(filterState) {
        if (!filterState) {
          return "";
        }
        if (filterState.operator === "missing") {
          return "is missing";
        }
        if (filterState.operator === "not_contains") {
          if (Array.isArray(filterState.value)) return `not: ${filterState.value.join(" | ")}`;
          return `not: ${filterState.value}`;
        }
        if (filterState.operator === "lt") {
          return `< ${filterState.value}`;
        }
        if (filterState.operator === "gt") {
          return `> ${filterState.value}`;
        }
        if (Array.isArray(filterState.value)) {
          return filterState.value.join(" | ");
        }
        return String(filterState.value || "");
      }

      function formatFilterValueForYaml(filterState) {
        if (filterState.operator === "missing") {
          return "{ op: missing }";
        }
        if (filterState.operator === "not_contains" || filterState.operator === "lt" || filterState.operator === "gt") {
          const v = Array.isArray(filterState.value)
            ? `[${filterState.value.map((item) => yamlQuote(item)).join(", ")}]`
            : yamlQuote(filterState.value);
          return `{ op: ${filterState.operator}, value: ${v} }`;
        }
        if (Array.isArray(filterState.value)) {
          return `[${filterState.value.map((item) => yamlQuote(item)).join(", ")}]`;
        }
        return yamlQuote(filterState.value);
      }

      function syncFilterInputs(column) {
        const filterState = columnFiltersState[column];
        const nextOperator = filterState?.operator || "contains";
        const nextValue = formatFilterValueForInput(filterState);

        document.querySelectorAll(`[data-filter-operator-column="${CSS.escape(column)}"]`).forEach((element) => {
          populateOperatorSelect(element, column, nextOperator);
        });

        document.querySelectorAll(`[data-filter-column="${CSS.escape(column)}"]`).forEach((element) => {
          updateFilterValueInputState(element, nextOperator, false);
          if (element.value !== nextValue) {
            element.value = nextValue;
          }
        });

        if (filterColumnSelect.value === column) {
          populateOperatorSelect(filterOperatorSelect, column, nextOperator);
          updateFilterValueInputState(filterValueInput, nextOperator, true);
          if (filterValueInput.value !== nextValue) {
            filterValueInput.value = nextValue;
          }
        }
      }

      function getSearchMatchingColumns() {
        const searchNeedle = (columnSearchInput.value || "").trim().toLowerCase();
        if (!searchNeedle) return [];
        return currentColumns.filter((column) => column.toLowerCase().includes(searchNeedle));
      }

      function setupDragHandlers(item, groupKey, visibleGroups) {
        item.addEventListener("dragstart", (e) => {
          dragSrcColumn = groupKey;
          e.dataTransfer.effectAllowed = "move";
        });
        item.addEventListener("dragover", (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = "move";
          item.classList.add("drag-over");
        });
        item.addEventListener("dragleave", () => {
          item.classList.remove("drag-over");
        });
        item.addEventListener("drop", (e) => {
          e.preventDefault();
          item.classList.remove("drag-over");
          if (!dragSrcColumn || dragSrcColumn === groupKey) return;
          const srcGroup = visibleGroups.find((g) => g.key === dragSrcColumn);
          if (!srcGroup) return;
          const srcIdx = visibleColumns.indexOf(srcGroup.columns[0]);
          const dstIdx = visibleColumns.indexOf(item.dataset.groupColumns.split(",")[0]);
          if (srcIdx === -1 || dstIdx === -1) return;
          srcGroup.columns.forEach((col) => {
            const idx = visibleColumns.indexOf(col);
            if (idx !== -1) visibleColumns.splice(idx, 1);
          });
          visibleColumns.splice(dstIdx, 0, ...srcGroup.columns);
          persistColumnPreferences();
          dragSrcColumn = null;
          buildColumnManager();
          renderTable();
        });
        item.addEventListener("dragend", () => {
          dragSrcColumn = null;
          document.querySelectorAll(".column-list-item.drag-over").forEach((el) => el.classList.remove("drag-over"));
        });
      }

      function buildColumnManager() {
        const searchNeedle = (columnSearchInput.value || "").trim().toLowerCase();
        visibleColumnsList.innerHTML = "";
        hiddenColumnsList.innerHTML = "";

        // For visible columns, compute merge groups so merged columns appear as one item
        const visibleGroups = visibleColumns.length
          ? computeColumnMergeGroups(baseRows, visibleColumns)
          : [];

        // Hidden columns: everything in currentColumns not currently visible.
        const hiddenCols = currentColumns.filter((c) => !visibleColumns.includes(c));

        // Render visible merge groups
        visibleGroups.forEach((group) => {
          const matchesSearch =
            !searchNeedle ||
            group.columns.some((col) => col.toLowerCase().includes(searchNeedle));
          if (!matchesSearch) return;

          const item = document.createElement("div");
          item.className = "column-list-item";
          item.draggable = true;
          item.dataset.column = group.key;

          const handle = document.createElement("span");
          handle.className = "drag-handle";
          handle.textContent = "⠿";
          handle.title = "Drag to reorder";

          const label = document.createElement("span");
          const isMerged = group.columns.length > 1;
          label.textContent = isMerged ? `${group.key} (${group.columns.length})` : group.key;
          if (isMerged) {
            label.title = `Merged columns: ${group.columns.join(", ")}`;
          }

          const button = document.createElement("button");
          button.type = "button";
          button.className = "secondary";
          button.textContent = "Hide";
          button.disabled = group.columns.includes(getPrimaryIdColumn());
          button.addEventListener("click", () => {
            group.columns.forEach((col) => setColumnVisible(col, false));
            buildColumnManager();
            renderTable();
          });

          item.dataset.groupColumns = group.columns.join(",");
          setupDragHandlers(item, group.key, visibleGroups);

          item.appendChild(handle);
          item.appendChild(label);
          item.appendChild(button);
          visibleColumnsList.appendChild(item);
        });

        // Render hidden columns
        hiddenCols.forEach((column) => {
          const matchesSearch = !searchNeedle || column.toLowerCase().includes(searchNeedle);
          if (!matchesSearch) return;

          const item = document.createElement("div");
          item.className = "column-list-item";

          const label = document.createElement("span");
          label.textContent = column;

          const button = document.createElement("button");
          button.type = "button";
          button.className = "secondary";
          button.textContent = "Show";
          button.addEventListener("click", () => {
            setColumnVisible(column, true);
            buildColumnManager();
            renderTable();
          });

          item.appendChild(label);
          item.appendChild(button);
          hiddenColumnsList.appendChild(item);
        });

        if (!visibleColumnsList.children.length) {
          visibleColumnsList.innerHTML = '<p class="empty-mini">No visible columns match.</p>';
        }
        if (!hiddenColumnsList.children.length) {
          hiddenColumnsList.innerHTML = '<p class="empty-mini">No hidden columns match.</p>';
        }
      }

      function yamlQuote(value) {
        return `"${String(value).replace(/\\/g, "\\\\").replace(/"/g, '\\"')}"`;
      }

      function unquoteYamlScalar(value) {
        const trimmed = value.trim();
        if (trimmed.startsWith('"') && trimmed.endsWith('"')) {
          return trimmed.slice(1, -1).replace(/\\"/g, '"').replace(/\\\\/g, "\\");
        }
        if (trimmed.startsWith("'") && trimmed.endsWith("'")) {
          return trimmed.slice(1, -1);
        }
        return trimmed;
      }

      function serializeFiltersForApi() {
        return Object.entries(columnFiltersState).map(([column, filterState]) => {
          const payload = { column, operator: filterState.operator };
          if (filterState.operator !== "missing") {
            payload.value = filterState.value;
          }
          return payload;
        });
      }

      function getCurrentMatchingExperimentPaths() {
        return currentMatchingIndexes.map((index) => String(currentRows[index]?.__s3_path || "")).filter(Boolean).sort();
      }

      function splitInlineYamlItems(value) {
        const parts = [];
        let current = "";
        let quote = null;
        let depth = 0;

        for (let index = 0; index < value.length; index += 1) {
          const char = value[index];
          if ((char === '"' || char === "'") && value[index - 1] !== "\\") {
            if (quote === char) {
              quote = null;
            } else if (!quote) {
              quote = char;
            }
            current += char;
            continue;
          }

          if (!quote && (char === "[" || char === "{")) {
            depth += 1;
          } else if (!quote && (char === "]" || char === "}")) {
            depth -= 1;
          }

          if (char === "," && !quote && depth === 0) {
            parts.push(current.trim());
            current = "";
            continue;
          }

          current += char;
        }

        if (current.trim()) {
          parts.push(current.trim());
        }

        return parts;
      }

      function findTopLevelColon(value) {
        let quote = null;
        let depth = 0;
        for (let index = 0; index < value.length; index += 1) {
          const char = value[index];
          if ((char === '"' || char === "'") && value[index - 1] !== "\\") {
            if (quote === char) {
              quote = null;
            } else if (!quote) {
              quote = char;
            }
            continue;
          }

          if (!quote && (char === "[" || char === "{")) {
            depth += 1;
            continue;
          }
          if (!quote && (char === "]" || char === "}")) {
            depth -= 1;
            continue;
          }

          if (char === ":" && !quote && depth === 0) {
            return index;
          }
        }

        return -1;
      }

      function parseInlineYamlList(value) {
        const trimmed = value.trim();
        if (!trimmed.startsWith("[") || !trimmed.endsWith("]")) {
          return null;
        }

        const inner = trimmed.slice(1, -1).trim();
        if (!inner) {
          return [];
        }

        return splitInlineYamlItems(inner).map((item) => unquoteYamlScalar(item));
      }

      function parseInlineYamlMapping(value) {
        const trimmed = value.trim();
        if (!trimmed.startsWith("{") || !trimmed.endsWith("}")) {
          return null;
        }

        const inner = trimmed.slice(1, -1).trim();
        if (!inner) {
          return {};
        }

        const result = {};
        splitInlineYamlItems(inner).forEach((entry) => {
          const colonIndex = findTopLevelColon(entry);
          if (colonIndex === -1) {
            return;
          }

          const key = unquoteYamlScalar(entry.slice(0, colonIndex));
          const rawValue = entry.slice(colonIndex + 1).trim();
          result[key] = parseInlineYamlList(rawValue) ?? unquoteYamlScalar(rawValue);
        });
        return result;
      }

      function exportFilterSettingsYaml() {
        const formData = new FormData(controlsForm);
        const bucket = String(formData.get("bucket") || "").trim();
        const prefix = String(formData.get("prefix") || "").trim();
        const activeFilters = Object.entries(columnFiltersState).filter(([, value]) => value);

        const lines = [];
        lines.push("bucket: " + yamlQuote(bucket));
        lines.push("prefix: " + yamlQuote(prefix));
        lines.push("filters:");
        if (activeFilters.length === 0) {
          lines.push("  []");
        } else {
          activeFilters.forEach(([column, value]) => {
            lines.push(`  - ${column}: ${formatFilterValueForYaml(value)}`);
          });
        }

        lines.push("matching_experiments:");
        if (currentMatchingIndexes.length === 0) {
          lines.push("  []");
        } else {
          currentMatchingIndexes.forEach((index) => {
            const row = currentRows[index] || {};
            lines.push("  - " + yamlQuote(row.__s3_path || ""));
          });
        }

        filterSettingsYaml.value = lines.join("\n");
      }

      async function importFilterSettingsYaml() {
        const text = (filterSettingsYaml.value || "").trim();
        if (!text) {
          setError("No YAML content to import.");
          return;
        }

        const nextFilters = {};
        let inFiltersSection = false;
        let inMatchingExperimentsSection = false;
        const importedMatchingPaths = [];

        const parseFilterEntry = (entryText) => {
          const filterMatch = entryText.match(/^([A-Za-z0-9_.\[\]-]+):\s*(.*)$/);
          if (!filterMatch) {
            return;
          }

          const column = filterMatch[1];
          const rawValue = filterMatch[2];
          if (!currentColumns.includes(column)) {
            return;
          }

          const parsedMapping = parseInlineYamlMapping(rawValue);
          if (parsedMapping) {
            const operator = parsedMapping.op || parsedMapping.operator || "contains";
            const value = Object.prototype.hasOwnProperty.call(parsedMapping, "value") ? parsedMapping.value : "";
            const normalized = normalizeFilterDefinition(operator, value);
            if (normalized && !normalized.invalid) {
              nextFilters[column] = normalized;
            }
            return;
          }

          const parsedList = parseInlineYamlList(rawValue);
          const normalized = normalizeFilterDefinition("contains", parsedList !== null ? parsedList : unquoteYamlScalar(rawValue));
          if (normalized && !normalized.invalid) {
            nextFilters[column] = normalized;
          }
        };

        text.split(/\r?\n/).forEach((rawLine) => {
          const line = rawLine.trim();
          if (!line || line.startsWith("#")) {
            return;
          }

          if (line === "filters:") {
            inFiltersSection = true;
            inMatchingExperimentsSection = false;
            return;
          }

          if (line === "matching_experiments:" || line === "experiments:") {
            inMatchingExperimentsSection = true;
            inFiltersSection = false;
            return;
          }

          if (inFiltersSection) {
            if (line === "[]") {
              return;
            }
            parseFilterEntry(line.startsWith("-") ? line.replace(/^-\s*/, "") : line);
            return;
          }

          if (inMatchingExperimentsSection) {
            const pathMatch = line.match(/^- \s*(.+)$/);
            if (pathMatch) {
              importedMatchingPaths.push(unquoteYamlScalar(pathMatch[1]));
              return;
            }
          }
        });

        columnFiltersState = nextFilters;
        sortRows();
        buildActiveFiltersPanel();
        renderTable();
        await applyFilters();

        const currentMatchingPaths = getCurrentMatchingExperimentPaths();
        if (importedMatchingPaths.length > 0) {
          const importedSorted = [...new Set(importedMatchingPaths)].sort();
          const isUpToDate =
            importedSorted.length === currentMatchingPaths.length &&
            importedSorted.every((path, index) => path === currentMatchingPaths[index]);
          setError(isUpToDate ? "Imported YAML matches the current experiment list." : "Imported YAML is stale: matching experiments differ from the current result.");
        } else {
          setError("Imported filters. No saved experiment list found to validate.");
        }
      }

      function populateFilterColumnSelect(preferredColumn = "") {
        const selectedColumn = preferredColumn || filterColumnSelect.value;
        const visibleSet = new Set(visibleColumns);

        // For visible columns, deduplicate using merge groups so only the representative key appears.
        const visibleKeys = visibleColumns.length
          ? computeColumnMergeGroups(baseRows, visibleColumns).map((g) => g.key)
          : [];

        // Hidden columns: everything in currentColumns not currently visible.
        const hiddenCols = currentColumns.filter((c) => !visibleSet.has(c));

        filterColumnSelect.innerHTML = "";

        const addGroup = (cols, label) => {
          if (!cols.length) return;
          const optgroup = document.createElement("optgroup");
          optgroup.label = label;
          cols.forEach((column) => {
            const option = document.createElement("option");
            option.value = column;
            option.textContent = column;
            optgroup.appendChild(option);
          });
          filterColumnSelect.appendChild(optgroup);
        };

        addGroup(visibleKeys, "Visible");
        addGroup(hiddenCols, "Hidden");

        const allCols = [...visibleKeys, ...hiddenCols];
        if (!allCols.length) {
          return;
        }

        if (selectedColumn && allCols.includes(selectedColumn)) {
          filterColumnSelect.value = selectedColumn;
        } else {
          filterColumnSelect.value = allCols[0];
        }
      }

      function updateFilterValueOptions() {
        const selectedColumn = filterColumnSelect.value;
        if (!selectedColumn) return;

        const existingFilter = columnFiltersState[selectedColumn];
        const selectedOperator = populateOperatorSelect(filterOperatorSelect, selectedColumn, existingFilter?.operator || filterOperatorSelect.value || "contains");
        updateFilterValueInputState(filterValueInput, selectedOperator, true);
        filterValueInput.value = existingFilter && existingFilter.operator === selectedOperator ? formatFilterValueForInput(existingFilter) : "";

        const values = new Set();
        currentRows.forEach((row) => {
          const val = String(row[selectedColumn] ?? "").trim();
          if (val) values.add(val);
        });

        const sortedValues = Array.from(values).sort();
        filterValueList.innerHTML = "";
        sortedValues.forEach((val) => {
          const option = document.createElement("option");
          option.value = val;
          filterValueList.appendChild(option);
        });
      }

      function buildActiveFiltersPanel() {
        activeFiltersList.innerHTML = "";
        const activeFilters = Object.entries(columnFiltersState);

        if (!activeFilters.length) {
          const empty = document.createElement("p");
          empty.className = "empty-mini";
          empty.textContent = "No active filters.";
          activeFiltersList.appendChild(empty);
          return;
        }

        activeFilters.forEach(([column, value]) => {
          const chip = document.createElement("div");
          chip.className = "filter-chip";

          const text = document.createElement("span");
          text.textContent = `${column}: ${formatFilterLabel(value)}`;

          const remove = document.createElement("button");
          remove.type = "button";
          remove.className = "secondary";
          remove.textContent = "Remove";
          remove.addEventListener("click", () => setColumnFilter(column, "contains", ""));

          chip.appendChild(text);
          chip.appendChild(remove);
          activeFiltersList.appendChild(chip);
        });
      }

      function openFilterComposer(prefillColumn) {
        populateFilterColumnSelect(prefillColumn);
        if (prefillColumn) {
          filterColumnSelect.value = prefillColumn;
        }
        updateFilterValueOptions();
        filterComposer.classList.remove("hidden");
        if (!filterValueInput.disabled) {
          filterValueInput.focus();
        }
      }

      function closeFilterComposer() {
        filterComposer.classList.add("hidden");
        populateOperatorSelect(filterOperatorSelect, filterColumnSelect.value || currentColumns[0] || getPrimaryIdColumn(), "contains");
        filterValueInput.value = "";
        updateFilterValueInputState(filterValueInput, filterOperatorSelect.value, true);
      }

      // group = { key: string, columns: string[] }  (key is the representative column)
      function createHeaderCell(group) {
        const column = group.key;
        const isMerged = group.columns.length > 1;
        const mergedColumnsByLength = isMerged ? [...group.columns].sort((a, b) => a.length - b.length || a.localeCompare(b)) : [];

        const th = document.createElement("th");
        if (isMerged) {
          th.classList.add("th-merged");
          th.title = mergedColumnsByLength.join("\n");
        }

        const wrap = document.createElement("div");
        wrap.className = "th-wrap";

        const label = document.createElement("button");
        label.type = "button";
        label.className = "th-label th-sort";
        const sortMarker = sortState.column === column ? (sortState.direction === "asc" ? " ↑" : " ↓") : "";
        const displayName = column;
        label.textContent = `${displayName}${sortMarker}`;
        // For merged columns the th.title already shows the full list; for single columns keep sort tip.
        let labelTitle = isMerged ? mergedColumnsByLength.join("\n") : "Sort by this column";
        if (column === "git_hash") {
          labelTitle += "\nHint: trailing ! means git.diff is not empty.";
        }
        label.title = labelTitle;
        label.addEventListener("click", () => {
          if (sortState.column !== column) {
            sortState = { column, direction: "asc" };
          } else if (sortState.direction === "asc") {
            sortState = { column, direction: "desc" };
          } else {
            sortState = { column: null, direction: null };
          }
          sortRows();
          renderTable();
        });

        const menuButton = document.createElement("button");
        menuButton.type = "button";
        menuButton.className = "header-menu-button secondary";
        menuButton.textContent = columnFiltersState[column] ? "Filtered" : "Menu";

        const menu = document.createElement("div");
        menu.className = "header-menu hidden";

        const filterLabel = document.createElement("label");
        filterLabel.textContent = "Filter";

        const filterState = columnFiltersState[column];

        const filterOperator = document.createElement("select");
        filterOperator.dataset.filterOperatorColumn = column;
        const selectedOperator = populateOperatorSelect(filterOperator, column, filterState?.operator || "contains");

        const filterInput = document.createElement("input");
        filterInput.value = formatFilterValueForInput(filterState);
        filterInput.dataset.filterColumn = column;
        updateFilterValueInputState(filterInput, selectedOperator, false);
        filterOperator.addEventListener("change", () => updateFilterValueInputState(filterInput, filterOperator.value, false));
        filterLabel.appendChild(filterInput);

        const operatorLabel = document.createElement("label");
        operatorLabel.textContent = "Operator";
        operatorLabel.appendChild(filterOperator);

        const applyHeaderFilterButton = document.createElement("button");
        applyHeaderFilterButton.type = "button";
        applyHeaderFilterButton.className = "secondary";
        applyHeaderFilterButton.textContent = "Apply Filter";
        applyHeaderFilterButton.addEventListener("click", () => {
          const applied = setColumnFilter(column, filterOperator.value, filterInput.value);
          if (applied) {
            menuButton.textContent = "Filtered";
          }
        });

        const visibilityButton = document.createElement("button");
        visibilityButton.type = "button";
        visibilityButton.className = "secondary";
        if (isMerged) {
          visibilityButton.textContent = `Hide ${group.columns.length} Merged Columns`;
          visibilityButton.addEventListener("click", () => {
            group.columns.forEach((col) => setColumnVisible(col, false));
            menu.classList.add("hidden");
            openHeaderMenu = null;
            buildColumnManager();
            renderTable();
          });
        } else {
          visibilityButton.textContent = visibleColumns.includes(column) ? "Hide Column" : "Show Column";
          visibilityButton.disabled = column === getPrimaryIdColumn();
          visibilityButton.addEventListener("click", () => {
            setColumnVisible(column, !visibleColumns.includes(column));
            menu.classList.add("hidden");
            openHeaderMenu = null;
            buildColumnManager();
            renderTable();
          });
        }

        const addFilterButton = document.createElement("button");
        addFilterButton.type = "button";
        addFilterButton.className = "secondary";
        addFilterButton.textContent = "Open In Filters Panel";
        addFilterButton.addEventListener("click", () => {
          filtersPanel.classList.remove("hidden");
          openFilterComposer(column);
          menu.classList.add("hidden");
          openHeaderMenu = null;
        });

        const clearButton = document.createElement("button");
        clearButton.type = "button";
        clearButton.className = "secondary";
        clearButton.textContent = "Clear Filter";
        clearButton.addEventListener("click", () => setColumnFilter(column, "contains", ""));

        menu.appendChild(operatorLabel);
        menu.appendChild(filterLabel);
        menu.appendChild(applyHeaderFilterButton);
        menu.appendChild(visibilityButton);
        menu.appendChild(addFilterButton);
        menu.appendChild(clearButton);

        menuButton.addEventListener("click", (event) => {
          event.stopPropagation();
          if (openHeaderMenu && openHeaderMenu !== menu) {
            openHeaderMenu.classList.add("hidden");
          }
          const shouldOpen = menu.classList.contains("hidden");
          menu.classList.toggle("hidden", !shouldOpen);
          openHeaderMenu = shouldOpen ? menu : null;
        });

        wrap.appendChild(label);
        wrap.appendChild(menuButton);
        wrap.appendChild(menu);
        th.appendChild(wrap);
        return th;
      }

      function shortenMiddle(value, maxLength = 100) {
        if (value.length <= maxLength) {
          return { text: value, truncated: false };
        }

        const startLength = Math.floor((maxLength - 3) / 2);
        const endLength = maxLength - 3 - startLength;
        const text = `${value.slice(0, startLength)}...${value.slice(value.length - endLength)}`;
        return { text, truncated: true };
      }

      function compareColumnValues(a, b, column) {
        const left = String(a[column] ?? "");
        const right = String(b[column] ?? "");

        const leftNumber = Number(left);
        const rightNumber = Number(right);
        const leftIsNumber = Number.isFinite(leftNumber) && left.trim() !== "";
        const rightIsNumber = Number.isFinite(rightNumber) && right.trim() !== "";

        if (leftIsNumber && rightIsNumber) {
          if (leftNumber < rightNumber) return -1;
          if (leftNumber > rightNumber) return 1;
          return 0;
        }

        return left.localeCompare(right, undefined, { numeric: true, sensitivity: "base" });
      }

      function sortRows() {
        currentRows = [...baseRows];
        if (!sortState.column || !sortState.direction) {
          return;
        }

        const multiplier = sortState.direction === "asc" ? 1 : -1;
        const sortColumn = sortState.column;
        currentRows.sort((a, b) => compareColumnValues(a, b, sortColumn) * multiplier);
      }

      async function copyTextToClipboard(text) {
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
            return true;
          }
        } catch (_) {
          // Fall back below when Clipboard API is blocked.
        }

        const temp = document.createElement("textarea");
        temp.value = text;
        temp.setAttribute("readonly", "");
        temp.style.position = "absolute";
        temp.style.left = "-9999px";
        document.body.appendChild(temp);
        temp.select();
        const copied = document.execCommand("copy");
        document.body.removeChild(temp);
        return copied;
      }

      function showCopyStatusBubble(element, message, durationMs = 1400) {
        let bubble = document.getElementById("copyStatusBubble");
        if (!bubble) {
          bubble = document.createElement("div");
          bubble.id = "copyStatusBubble";
          bubble.className = "copy-status-bubble";
          document.body.appendChild(bubble);
        }

        bubble.textContent = message;
        bubble.classList.remove("hidden");

        const rect = element.getBoundingClientRect();
        const top = Math.max(8, rect.top - 34);
        const left = Math.min(window.innerWidth - 220, Math.max(8, rect.left));
        bubble.style.top = `${top}px`;
        bubble.style.left = `${left}px`;

        if (bubble._hideTimer) {
          window.clearTimeout(bubble._hideTimer);
        }
        bubble._hideTimer = window.setTimeout(() => {
          bubble.classList.add("hidden");
        }, durationMs);
      }

      function renderTable() {
        tableHead.innerHTML = "";
        tableBody.innerHTML = "";

        // Keep filter column ordering in sync with current visibility state.
        populateFilterColumnSelect();

        const activeColumns = visibleColumns.length ? visibleColumns : [getPrimaryIdColumn()];
        // Merge columns that are identical across all experiments.
        const groups = computeColumnMergeGroups(baseRows, activeColumns);

        const headRow = document.createElement("tr");
        groups.forEach((group) => headRow.appendChild(createHeaderCell(group)));
        tableHead.appendChild(headRow);

        currentRows.forEach((rowObj, index) => {
          const row = document.createElement("tr");
          row.dataset.rowIndex = String(index);

          groups.forEach((group) => {
            const td = document.createElement("td");
            const rawText = String(rowObj[group.key] ?? "");
            const shortened = shortenMiddle(rawText);
            const valueSpan = document.createElement("span");
            valueSpan.className = "cell-value";
            valueSpan.textContent = shortened.text;
            const isPrimaryIdGroup = group.columns.includes(getPrimaryIdColumn());
            if (isPrimaryIdGroup) {
              const fullPath = String(rowObj.__s3_path || rawText);
              valueSpan.title = fullPath;
              valueSpan.addEventListener("dblclick", async () => {
                const copied = await copyTextToClipboard(fullPath);
                if (copied) {
                  showCopyStatusBubble(valueSpan, "Copied full path");
                } else {
                  showCopyStatusBubble(valueSpan, "Could not copy path");
                }
              });
            } else if (shortened.truncated) {
              valueSpan.title = rawText;
            }
            td.appendChild(valueSpan);
            row.appendChild(td);
          });

          tableBody.appendChild(row);
        });

        applyFilters();
      }

      async function applyFilters() {
        if (!currentRows.length) {
          currentMatchingIndexes = [];
          visibleCount.textContent = "0";
          return [];
        }

        const token = ++filterRequestToken;
        const filterSpecs = serializeFiltersForApi();
        let matchingIndexes = currentRows.map((_, index) => index);

        if (activeDatasetJobId && filterSpecs.length) {
          try {
            const response = await fetch("/api/filter", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                job_id: activeDatasetJobId,
                filters: filterSpecs,
                ordered_paths: currentRows.map((row) => String(row.__s3_path || "")).filter(Boolean),
              }),
            });
            const data = await response.json();
            if (!response.ok) {
              throw new Error(data.error || "Could not filter rows");
            }
            matchingIndexes = Array.isArray(data.matching_indexes) ? data.matching_indexes : [];
          } catch (err) {
            if (token !== filterRequestToken) {
              return currentMatchingIndexes;
            }
            setError(String(err));
            matchingIndexes = [];
          }
        }

        if (token !== filterRequestToken) {
          return currentMatchingIndexes;
        }

        currentMatchingIndexes = matchingIndexes;

        const rows = Array.from(tableBody.querySelectorAll("tr"));
        const matchingIndexSet = new Set(matchingIndexes);
        let shown = 0;

        rows.forEach((row) => {
          const rowIndex = Number(row.dataset.rowIndex || "0");
          const matches = matchingIndexSet.has(rowIndex);
          row.style.display = matches ? "" : "none";
          if (matches) shown += 1;
        });

        visibleCount.textContent = String(shown);
        return matchingIndexes;
      }

      function initializeData(columns, rows, datasetJobId) {
        activeDatasetJobId = datasetJobId;
        currentColumns = columns;
        baseRows = [...rows];
        currentRows = [...rows];
        currentMatchingIndexes = rows.map((_, index) => index);
        applyPersistedHiddenColumns();
        columnFiltersState = {};
        sortState = { column: null, direction: null };

        closeSettingsMenu();

        if (autoHideConstantCheckbox.checked) {
          hideConstantColumns();
        }

        totalCount.textContent = String(rows.length);
        tableWrap.classList.toggle("hidden", rows.length === 0);
        tableControls.classList.toggle("hidden", rows.length === 0);
        filtersPanel.classList.toggle("hidden", rows.length === 0);
        countLine.classList.toggle("hidden", rows.length === 0);
        columnManager.classList.add("hidden");
        closeFilterComposer();
        emptyState.textContent = rows.length === 0 ? "No experiments found." : "";

        if (rows.length === 0) {
          return;
        }

        sortRows();
        populateFilterColumnSelect();
        buildColumnManager();
        buildActiveFiltersPanel();
        renderTable();
      }

      async function pollStatus(jobId) {
        while (true) {
          const response = await fetch(`/api/status/${jobId}`);
          const status = await response.json();

          if (!response.ok) {
            throw new Error(status.error || "Could not read load status");
          }

          updateProgress(status);

          if (status.status === "done") {
            setLoading(false);
            currentJobId = null;
            initializeData(status.columns || [], status.rows || [], jobId);
            setError("");
            return;
          }

          if (status.status === "error") {
            setLoading(false);
            currentJobId = null;
            setError(status.error || "Loading failed");
            return;
          }

          if (status.status === "cancelled") {
            setLoading(false);
            currentJobId = null;
            setError(status.error || "Loading cancelled");
            return;
          }

          await new Promise((resolve) => setTimeout(resolve, 600));
        }
      }

      controlsForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        setError("");
        setLoading(true);
        emptyState.textContent = "Loading...";

        const formData = new FormData(controlsForm);
        const payload = {
          bucket: String(formData.get("bucket") || "").trim(),
          prefix: String(formData.get("prefix") || "").trim(),
          region: String(formData.get("region") || "").trim(),
          endpoint_url: String(formData.get("endpoint_url") || "").trim(),
        };

        try {
          const response = await fetch("/api/load", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || "Could not start loading");
          }

          currentJobId = data.job_id;
          await pollStatus(currentJobId);
        } catch (err) {
          setLoading(false);
          currentJobId = null;
          setError(String(err));
        }
      });

      abortButton.addEventListener("click", async () => {
        if (!currentJobId) return;
        try {
          await fetch(`/api/abort/${currentJobId}`, { method: "POST" });
        } catch (_) {
          setError("Abort request failed");
        }
      });

      openColumnManagerButton.addEventListener("click", () => {
        const shouldOpen = columnManager.classList.contains("hidden");
        if (shouldOpen) {
          filtersPanel.classList.add("hidden");
          closeFilterComposer();
        }
        buildColumnManager();
        columnManager.classList.toggle("hidden", !shouldOpen);
      });

      closeColumnManagerButton.addEventListener("click", () => {
        columnManager.classList.add("hidden");
      });

      openFilterManagerButton.addEventListener("click", () => {
        const shouldOpen = filtersPanel.classList.contains("hidden");
        if (shouldOpen) {
          columnManager.classList.add("hidden");
          populateFilterColumnSelect();
        }
        filtersPanel.classList.toggle("hidden", !shouldOpen);
        if (!shouldOpen) {
          closeFilterComposer();
        }
      });

      closeFilterManagerButton.addEventListener("click", () => {
        filtersPanel.classList.add("hidden");
        closeFilterComposer();
      });

      showAllColumnsButton.addEventListener("click", () => {
        visibleColumns = [...currentColumns];
        persistColumnPreferences();
        buildColumnManager();
        renderTable();
      });

      hideConstantColumnsButton.addEventListener("click", () => {
        hideConstantColumns();
        buildColumnManager();
        renderTable();
      });

      hideSearchMatchesButton.addEventListener("click", () => {
        const matching = getSearchMatchingColumns();
        matching.forEach((column) => setColumnVisible(column, false));
        buildColumnManager();
        renderTable();
      });

      showSearchMatchesButton.addEventListener("click", () => {
        const matching = getSearchMatchingColumns();
        matching.forEach((column) => setColumnVisible(column, true));
        buildColumnManager();
        renderTable();
      });

      clearAllFiltersButton.addEventListener("click", () => {
        columnFiltersState = {};
        buildActiveFiltersPanel();
        renderTable();
      });

      columnSearchInput.addEventListener("input", buildColumnManager);
      filterOperatorSelect.addEventListener("change", () => updateFilterValueInputState(filterValueInput, filterOperatorSelect.value, true));

      openAddFilterButton.addEventListener("click", () => openFilterComposer());
      cancelAddFilterButton.addEventListener("click", closeFilterComposer);

      applyFilterButton.addEventListener("click", () => {
        const applied = setColumnFilter(filterColumnSelect.value, filterOperatorSelect.value, filterValueInput.value);
        if (applied) {
          closeFilterComposer();
        }
      });

      exportFilterSettingsButton.addEventListener("click", exportFilterSettingsYaml);
      importFilterSettingsButton.addEventListener("click", importFilterSettingsYaml);

      autoHideConstantCheckbox.addEventListener("change", () => {
        if (autoHideConstantCheckbox.checked) {
          hideConstantColumns();
        } else {
          visibleColumns = [...currentColumns];
          persistColumnPreferences();
        }
        buildColumnManager();
        renderTable();
      });

      if (presetPublic && endpointInput) {
        presetPublic.addEventListener("click", () => {
          endpointInput.value = "https://s3.mlcloud.uni-tuebingen.de";
          if (regionInput && !regionInput.value.trim()) {
            regionInput.value = "us-east-1";
          }
        });
      }

      if (presetPrivate && endpointInput) {
        presetPrivate.addEventListener("click", () => {
          endpointInput.value = "http://192.168.213.99";
          if (regionInput && !regionInput.value.trim()) {
            regionInput.value = "us-east-1";
          }
        });
      }

      document.addEventListener("click", (event) => {
        if (openHeaderMenu && !openHeaderMenu.closest(".th-wrap")?.contains(event.target)) {
          openHeaderMenu.classList.add("hidden");
          openHeaderMenu = null;
        }
      });

      if (new URLSearchParams(window.location.search).get("bucket")) {
        controlsForm.requestSubmit();
      }
    </script>
  </body>
</html>
